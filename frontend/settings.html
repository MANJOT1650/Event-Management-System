<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - EMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        
        <main class="main-content">
            <h1>Account Settings</h1>
            <p style="color: var(--md-sys-color-on-surface-variant); margin-bottom: 24px;">Update your personal profile.</p>

            <div class="md-card" style="max-width: 500px;">
                <form id="settingsForm">
                    <div class="md-input-container">
                        <input type="text" id="s-name" class="md-input" required placeholder=" ">
                        <label class="md-label">Full Name</label>
                    </div>

                    <div class="md-input-container">
                        <input type="email" id="s-email" class="md-input" required placeholder=" ">
                        <label class="md-label">Email Address</label>
                    </div>
                    
                    <div class="md-input-container">
                        <input type="password" id="s-password" class="md-input" placeholder=" ">
                        <label class="md-label">New Password (leave blank to keep current)</label>
                    </div>

                    <button type="submit" class="md-btn md-btn-primary w-100 mt-1" style="height: 48px;">
                        Save Changes
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;

            await loadComponent('navbar-placeholder', 'components/navbar.html');
            await loadComponent('sidebar-placeholder', 'components/sidebar.html');
            
            document.getElementById('nav-username').textContent = user.name;
            
            // Re-check role for admin specifically if needed to show/hide the admin menu
            if (user.role === 'ADMIN') {
                document.getElementById('menu-admin').classList.remove('hidden');
            }
            if (user.role === 'PARTICIPANT') {
                document.getElementById('menu-history').classList.remove('hidden');
            }

            // Pre-fill existing logic (For email, we'd ideally fetch it, but let's assume standard flow)
            // We can fetch user profile via API if we create a GET /api/users/profile. 
            // For now, since user object in localstorage only has ID, Name, Role, let's at least pre-fill the name.
            document.getElementById('s-name').value = user.name;
        });

        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                document.getElementById(id).innerHTML = await response.text();
            } catch (err) { console.error(err); }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('s-name').value;
            const email = document.getElementById('s-email').value;
            const password = document.getElementById('s-password').value;

            try {
                await api.put('/users/profile', {
                    name: name,
                    email: email,
                    password: password
                });
                
                showSnackbar('Profile updated successfully!');
                
                // Update local storage so navbar reflects it
                const user = JSON.parse(localStorage.getItem('user'));
                user.name = name;
                localStorage.setItem('user', JSON.stringify(user));
                document.getElementById('nav-username').textContent = name;
                
                if (password) {
                    showSnackbar('Password changed. Please log in again.');
                    setTimeout(() => logout(), 2000);
                }
            } catch (err) {
                showSnackbar('Failed to update profile.');
            }
        });
    </script>
</body>
</html>
